services:
  - type: web
    name: hr-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: CACHE_TTL_SECONDS
        value: 300
      - key: STALE_CACHE_MAX_AGE_SECONDS
        value: 86400
      - key: SHEET_TIMEOUT_SECONDS
        value: 15
