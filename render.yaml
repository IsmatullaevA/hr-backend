services:
  - type: web
    name: hr-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FRONTEND_ORIGINS
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: GOOGLE_SHEET_URL
        sync: false
